name: Build Windows

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm test

      - run: npm run build:win

      - name: Stage loose ffmpeg/ffprobe binaries
        shell: bash
        run: |
          cp "$(node -e "console.log(require('ffmpeg-static'))")" dist/ffmpeg.exe
          cp "$(node -e "console.log(require('ffprobe-static').path)")" dist/ffprobe.exe

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath music-normalize-win-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: music-normalize-win-x64
          path: music-normalize-win-x64.zip

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: music-normalize-win-x64.zip
